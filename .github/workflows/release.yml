name: Release (macOS + Windows)

# Builds installers and publishes a draft GitHub Release every time a version
# tag (v0.2.0, v1.0.0, …) is pushed. See app/docs/UPDATES.md for the flow.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest           # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest           # Intel Mac
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    # Hard cap so a hung signing/notarization step fails fast instead of
    # burning the full 6h job limit (macOS minutes bill at 10x).
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: npm install

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign) — REQUIRED secret so each release ships
          # latest.json + .sig and the in-app "Update & Restart" button works.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization — tauri-action imports the cert,
          # signs with the Developer ID identity, then notarizes & staples the
          # .dmg (because APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID are present).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v0.2.0' }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || 'J.A.R.V.I.S. v0.2.0' }}
          releaseBody: 'Downloads: macOS — .dmg, Windows — .exe (NSIS) / .msi.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
