name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/epic-galileo-ko32bk]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Mirror app to legacy JARVIS.html
        run: cp app/src/index.html app/src/JARVIS.html
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'app/src'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
